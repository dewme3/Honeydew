<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>점심 선택 시간선</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:"Cafe24 Ssurround","Jua","Gaegu","Poor Story","Comic Sans MS","Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:radial-gradient(circle at 16% 18%,rgba(255,255,255,.42),transparent 17%),radial-gradient(circle at 82% 23%,rgba(255,255,255,.34),transparent 14%),radial-gradient(circle at 76% 78%,rgba(255,241,118,.34),transparent 20%),linear-gradient(135deg,#ff8fc7,#ffb6d9 48%,#ffd6e9);color:#fff176;user-select:none}
.screen{width:100vw;height:100vh;display:none;align-items:center;justify-content:center;text-align:center;padding:4.5vw;position:relative}
.screen.active{display:flex;flex-direction:column}
.label{font-size:clamp(22px,3vw,52px);letter-spacing:.12em;color:#fffde8;margin-bottom:2vh;text-shadow:0 4px 0 rgba(255,104,170,.52),0 0 18px rgba(255,255,255,.55);z-index:5}
.main-text{font-size:clamp(34px,5.2vw,92px);font-weight:900;line-height:1.25;color:#fff9b8;text-shadow:0 6px 0 rgba(255,104,170,.52),0 0 22px rgba(255,255,255,.62);z-index:5}
.question{margin-top:2.5vh;font-size:clamp(28px,4.2vw,72px);font-weight:900;color:#fffde8;line-height:1.25;text-shadow:0 5px 0 rgba(255,104,170,.52),0 0 18px rgba(255,255,255,.58);z-index:5}
.choices{display:flex;gap:clamp(18px,4vw,72px);margin-top:6vh;z-index:8}
.choice{width:clamp(190px,25vw,400px);height:clamp(190px,25vw,400px);border:clamp(4px,.5vw,8px) solid #fffde8;border-radius:42px;background:rgba(255,253,224,.28);box-shadow:0 12px 0 rgba(255,104,170,.28),inset 0 0 28px rgba(255,255,255,.28);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:.18s;backdrop-filter:blur(2px)}
.choice:hover{transform:translateY(-8px) scale(1.025);background:rgba(255,253,224,.42);box-shadow:0 18px 0 rgba(255,104,170,.25),inset 0 0 32px rgba(255,255,255,.34)}
.food-icon{font-size:clamp(74px,10vw,160px);line-height:1;filter:drop-shadow(0 7px 0 rgba(255,104,170,.22))}
.choice-label{margin-top:2.2vh;font-size:clamp(28px,4vw,64px);font-weight:900;color:#fff176;text-shadow:0 4px 0 rgba(255,104,170,.52),0 0 16px rgba(255,255,255,.56)}
.result-food{font-size:clamp(96px,15vw,260px);line-height:1;margin-bottom:3vh;filter:drop-shadow(0 11px 0 rgba(107,69,184,.22));z-index:5;animation:pop .42s ease-out}
.result-title{font-size:clamp(28px,4vw,70px);font-weight:900;color:#fffde8;text-shadow:0 5px 0 rgba(255,104,170,.52),0 0 18px rgba(255,255,255,.55);z-index:5}
.result-message{margin-top:2.5vh;font-size:clamp(38px,5.8vw,104px);font-weight:900;line-height:1.18;color:#fff176;-webkit-text-stroke:clamp(1px,.12vw,2px) rgba(255,255,255,.38);text-shadow:0 7px 0 rgba(107,69,184,.35),0 0 26px rgba(255,255,255,.70);z-index:5}
.day-night{position:absolute;inset:0;pointer-events:none;z-index:1}
.sun{position:absolute;left:clamp(42px,7vw,120px);top:clamp(38px,8vh,110px);width:clamp(120px,16vw,245px);height:clamp(120px,16vw,245px);border-radius:50%;background:radial-gradient(circle,#fffde8 0 35%,#fff176 36% 70%,rgba(255,241,118,0) 71%);box-shadow:0 0 42px rgba(255,241,118,.72);animation:sunPulse 2.6s infinite ease-in-out}
.sun:before{content:"☀";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(78px,10vw,160px);color:#ff9f43;text-shadow:0 5px 0 rgba(255,104,170,.22)}
.moon{position:absolute;right:clamp(48px,8vw,140px);bottom:clamp(58px,10vh,145px);width:clamp(110px,15vw,230px);height:clamp(110px,15vw,230px);border-radius:50%;background:#fffde8;box-shadow:0 0 38px rgba(255,253,224,.72);animation:moonFloat 3.2s infinite ease-in-out}
.moon:after{content:"";position:absolute;width:78%;height:78%;right:-8%;top:2%;border-radius:50%;background:#d7c7ff}
.star{position:absolute;color:#fffde8;font-size:clamp(22px,3vw,52px);text-shadow:0 3px 0 rgba(107,69,184,.26);animation:twinkle 2.4s infinite ease-in-out}.st1{right:24%;top:16%}.st2{right:12%;top:31%;animation-delay:.7s}.st3{left:20%;bottom:18%;animation-delay:1.2s}.st4{left:12%;top:42%;animation-delay:1.7s}
.bubble{position:absolute;border-radius:999px;background:rgba(255,255,255,.30);box-shadow:inset 0 0 18px rgba(255,255,255,.35);animation:floaty 4s infinite ease-in-out;pointer-events:none}.b1{width:70px;height:70px;top:12%;left:8%}.b2{width:42px;height:42px;top:22%;right:11%;animation-delay:.7s}.b3{width:55px;height:55px;bottom:18%;left:13%;animation-delay:1.4s}.b4{width:86px;height:86px;bottom:13%;right:10%;animation-delay:2s}
.footer{position:absolute;inset:auto 0 4vh 0;font-size:clamp(18px,2.2vw,36px);font-weight:900;color:#fffde8;opacity:.92;text-shadow:0 3px 0 rgba(255,104,170,.52);z-index:6}
@keyframes floaty{0%,100%{transform:translateY(0);opacity:.55}50%{transform:translateY(-18px);opacity:.88}}
@keyframes twinkle{0%,100%{opacity:.45;transform:scale(.85) rotate(-8deg)}50%{opacity:1;transform:scale(1.15) rotate(8deg)}}
@keyframes sunPulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.06);opacity:1}}
@keyframes moonFloat{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-14px) rotate(3deg)}}
@keyframes pop{0%{transform:scale(.65) rotate(-8deg);opacity:0}70%{transform:scale(1.08) rotate(4deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@media(max-width:760px){.choices{flex-direction:column;gap:20px}.choice{width:min(78vw,360px);height:min(38vh,230px)}.sun,.moon{opacity:.38}}
</style>
</head>
<body>
<section id="selectScreen" class="screen active">
  <div class="bubble b1"></div><div class="bubble b2"></div><div class="bubble b3"></div><div class="bubble b4"></div>
  <div class="label">TIME COORDINATE</div>
  <div class="main-text">일단 밥을 먹어야해.</div>
  <div class="question">이 날 점심<br>우리 뭐 먹었지?</div>
  <div class="choices">
    <div class="choice" onclick="chooseFood('burger')" role="button" aria-label="햄버거 선택">
      <div class="food-icon">🍔</div><div class="choice-label">햄버거</div>
    </div>
    <div class="choice" onclick="chooseFood('sushi')" role="button" aria-label="초밥 선택">
      <div class="food-icon">🍣</div><div class="choice-label">초밥</div>
    </div>
  </div>
  <div class="footer">♡ 사라진 7월 11일 ♡</div>
</section>
<section id="resultScreen" class="screen">
  <div class="day-night"><div class="sun"></div><div class="moon"></div><div class="star st1">✦</div><div class="star st2">✧</div><div class="star st3">✦</div><div class="star st4">♡</div></div>
  <div id="resultFood" class="result-food">🍔</div>
  <div id="resultTitle" class="result-title">햄버거 시간선이 선택되었습니다.</div>
  <div class="result-message">낮과 밤의 시간을<br>되돌려라</div>
  <div class="footer">♡ 사라진 7월 11일 ♡</div>
</section>
<script>
const selectScreen=document.getElementById("selectScreen");
const resultScreen=document.getElementById("resultScreen");
const resultFood=document.getElementById("resultFood");
const resultTitle=document.getElementById("resultTitle");
function chooseFood(food){
  if(food==="burger"){
    resultFood.textContent="🍔";
    resultTitle.textContent="햄버거 시간선이 선택되었습니다.";
  }else{
    resultFood.textContent="🍣";
    resultTitle.textContent="초밥 시간선이 선택되었습니다.";
  }
  selectScreen.classList.remove("active");
  resultScreen.classList.add("active");
}
function resetChoice(){
  resultScreen.classList.remove("active");
  selectScreen.classList.add("active");
}
document.addEventListener("keydown",e=>{
  if(e.key==="1") chooseFood("burger");
  if(e.key==="2") chooseFood("sushi");
  if(e.key.toLowerCase()==="r") resetChoice();
  if(e.key.toLowerCase()==="f"){
    if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>{});}
    else{document.exitFullscreen().catch(()=>{});}
  }
});
document.addEventListener("dblclick",()=>{
  if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>{});}
});
</script>
</body>
</html>
